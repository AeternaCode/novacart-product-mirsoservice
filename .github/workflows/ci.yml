name: Product Service CI

on:
  push:
    branches:
      - 'feature/**'

  pull_request:
    branches:
      - develop

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Give Execute Permission
        run: chmod +x gradlew

      - name: Build Project
        run: ./gradlew build
